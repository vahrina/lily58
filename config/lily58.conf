# wireless
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# enable debounce
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# enable zmk studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# nkro
CONFIG_USB_HID_BOOT_PROTOCOL=n

# display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# nice!view
CONFIG_NICE_VIEW_GEM_ANIMATION=n
CONFIG_NICE_VIEW_GEM_WPM_FIXED_RANGE=n
# CONFIG_NICE_VIEW_GEM_WPM_FIXED_RANGE_MAX=120

# logging (increased power draw)
# CONFIG_ZMK_USB_LOGGING=y
